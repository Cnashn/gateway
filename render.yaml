services:
  - type: web
    name: gateway
    runtime: docker
    plan: free
    # Match the Upstash Redis region (us-east-1): every request makes one
    # Redis round trip for the rate-limit check, so a cross-region gateway
    # would add tens of ms to every allowed request.
    region: virginia
    healthCheckPath: /healthz
    envVars:
      # Upstash rediss:// URL, set in the Render dashboard, never committed.
      - key: GATEWAY_REDIS_URL
        sync: false
      # Single-service deploy has no real upstreams; serve the built-in
      # echo handlers instead. Render injects PORT for the listen address.
      - key: GATEWAY_DEMO
        value: "true"
