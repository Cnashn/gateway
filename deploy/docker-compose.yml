services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GATEWAY_REDIS_URL: "redis://redis:6379"
    volumes:
      - ../config.yaml:/config.yaml:ro
    command: ["-config", "/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
